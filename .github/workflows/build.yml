name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip Project
        run: unzip GameAssist_Complete.zip
      - name: Build APK
        run: |
          cd GameAssist
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameAssist-APK
          path: GameAssist/app/build/outputs/apk/debug/app-debug.apk